<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión · Rescate de Comida</title>
    
    <!-- CSS BASE (siempre se carga) -->
    <link rel="stylesheet" href="login.css" />
    
    <!-- CSS DE MODO (se carga según preferencia) -->
    <link rel="stylesheet" href="login-normal.css" id="modoCSS" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="images/logo.png" alt="Logo" class="login-logo" />
                <h1>Iniciar Sesión</h1>
                <p class="subtitulo">Únete a la revolución contra el desperdicio</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope" aria-hidden="true"></i> Correo Electrónico
                    </label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required />
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock" aria-hidden="true"></i> Contraseña
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Ingresa tu contraseña" required />
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" /> Recordarme
                    </label>
                    <a href="#" class="forgot-password">
                        <i class="fas fa-key" aria-hidden="true"></i> 
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt" aria-hidden="true"></i> Iniciar Sesión
                </button>

                <p class="register-link">
                    ¿No tienes cuenta? <a href="registro/registro.html"><i class="fas fa-user-plus" aria-hidden="true"></i> Regístrate aquí</a>
                </p>
            </form>

            <!-- ===== SWITCHES ABAJO ===== -->
            <div class="accesibilidad-footer">
                <div class="switch-group">
                    <span class="switch-label">
                        <i class="fas fa-eye" aria-hidden="true"></i>
                        Modo daltónico
                    </span>
                    <label class="switch">
                        <input type="checkbox" id="modoDaltonico" />
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="switch-group">
                    <span class="switch-label">
                        <i class="fas fa-font" aria-hidden="true"></i>
                        Texto grande
                    </span>
                    <label class="switch">
                        <input type="checkbox" id="textoGrande" />
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
